<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eira Digital</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="eira-favicon.png">
  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      background:#FFFFFF;
      font-family:"DM Sans",sans-serif;
      color:#000;
    }

    .container{
      width:360px;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
    }

    .title{
      font-size:32px;
      font-weight:700;
      line-height:120%;
      letter-spacing:-0.04em;
      margin-bottom:32px;
    }

    .cv-button{
      height:56px;

      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;

      padding:16px 32px;

      border-radius:500px;

      background:#E2F505;
      color:#000;

      text-decoration:none;

      font-family:"DM Sans",sans-serif;
      font-size:18px;
      font-weight:500;
      line-height:200%;

      transition:
        background .25s ease,
        color .25s ease;

      user-select:none;
      -webkit-user-select:none;
    }

    .icon-circle{

      width:24px;
      height:24px;

      display:flex;
      justify-content:center;
      align-items:center;

      border-radius:50%;

      transition:background .2s ease;
    }

    .icon{

      width:24px;
      height:24px;

      transform:rotate(135deg);

      transition:
        color .2s ease,
        transform .2s ease;
    }

    .icon svg{
      width:24px;
      height:24px;
      display:block;
      stroke:currentColor;
    }

    .cv-button:hover{

      background:#E2F505;
      color:#000;

    }

    .cv-button:hover .icon-circle{

      background:#FFFFFF;

    }

    .cv-button:active{

      background:#000;
      color:#FFF;

    }

    .cv-button:active .icon-circle{

      background:transparent;

    }

  </style>

</head>

<body>

<main class="container">

<h1 class="title">
Download my resume in English.
</h1>

<a
class="cv-button"
href="KayleighMariaGonzalez_CV_EN_2026.pdf"
download>

<span>Resume</span>

<span class="icon-circle">

<span class="icon">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
<path d="M7.61914 17.2699L17.5186 7.3704" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M17.519 15.8556V7.37027" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M9.0332 7.37024H17.5185" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

</span>

</span>

</a>

</main>

</body>
</html>
