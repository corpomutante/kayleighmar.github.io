<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Kayleigh's CV</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #FFFFFF;
      font-family: "DM Sans", sans-serif;
      color: #000000;
    }

    .container {
      width: 360px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      line-height: 120%;
      letter-spacing: -0.04em;
      text-align: left;
      margin-bottom: 32px;
    }

    .cv-button {
      width: 168px;
      height: 56px;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 16px 32px;

      border-radius: 500px;
      border: none;

      background: #E2F505;
      color: #000000;

      font-family: "DM Sans", sans-serif;
      font-size: 18px;
      font-weight: 500;
      line-height: 200%;
      text-decoration: none;

      transition: background-color 0.25s ease, color 0.25s ease;
      cursor: pointer;
    }

    .cv-button:hover {
      background: #000000;
      color: #FFFFFF;
    }
  </style>
</head>

<body>

  <main class="container">

    <h1 class="title">
      Download my resume in English.
    </h1>

    <a
      class="cv-button"
      href="KayleighMariaGonzalez_CV_EN_2026.pdf"
      download
    >
      Download CV
    </a>

  </main>

</body>
</html>
