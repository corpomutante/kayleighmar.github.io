<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Kayleigh's CV</title>

  <!-- DM Sans -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "DM Sans", sans-serif;
      background: #ffffff;
      color: #000000;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      max-width: 420px;
      padding: 24px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 16px;
      font-weight: 400;
      color: #333;
      margin-bottom: 28px;
    }

    /* BUTTON */
    .cv-button {
      width: 168px;
      height: 56px;

      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      flex-wrap: nowrap;

      padding: 16px 32px;
      border-radius: 500px;

      background: #E2F505;
      color: #000000;

      font-family: "DM Sans", sans-serif;
      font-weight: 500;
      font-size: 18px;
      line-height: 200%;

      text-decoration: none;

      transition: all 0.2s ease;
      box-sizing: border-box;
    }

    .cv-button:hover {
      background: #000000;
      color: #ffffff;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="title">
      Download my CV
    </div>

    <div class="subtitle">
      Download my resume in English.
    </div>

    <a class="cv-button" href="KayleighMariaGonzalez_CV_EN_2026.pdf" download>
      Download CV
    </a>

  </div>

</body>
</html>
